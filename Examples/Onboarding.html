<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#1c1c1c] flex items-center justify-center min-h-screen p-4">

<div class="bg-[#0f5f57] w-full max-w-md p-8 rounded-xl text-white">

  <h1 class="text-lg tracking-widest mb-6">INURU</h1>

  <h2 class="text-xl mb-2">Welcome!</h2>
  <p class="text-sm text-gray-300 mb-6">
    Help our coach get to know you better
  </p>

  <form class="space-y-4">
    <input type="text" placeholder="Whatsapp number"
      class="w-full p-3 rounded bg-[#0a4f48] outline-none">

    <input type="email" placeholder="Email"
      class="w-full p-3 rounded bg-[#0a4f48] outline-none">

    <select class="w-full p-3 rounded bg-[#0a4f48] outline-none">
      <option>Role/Position</option>
      <option>Student</option>
      <option>Teacher</option>
    </select>

    <input type="text" placeholder="School Name"
      class="w-full p-3 rounded bg-[#0a4f48] outline-none">

    <button class="w-full bg-[#2bb39b] py-3 rounded font-semibold hover:bg-[#249d88]">
      Next →
    </button>
  </form>

</div>

</body>
</html>
