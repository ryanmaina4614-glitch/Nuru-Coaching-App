<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#1c1c1c] flex items-center justify-center min-h-screen p-4">

<div class="bg-[#0f5f57] w-full max-w-md p-8 rounded-xl text-white">

  <h1 class="text-lg tracking-widest mb-6">INURU</h1>

  <h2 class="text-xl mb-2">Welcome Back!</h2>
  <p class="text-sm text-gray-300 mb-6">
    Don’t have an account?
    <a href="signup.html" class="underline">Sign Up</a>
  </p>

  <form class="space-y-4">
    <input type="text" placeholder="Username"
      class="w-full p-3 rounded bg-[#0a4f48] outline-none">

    <input type="password" placeholder="Password"
      class="w-full p-3 rounded bg-[#0a4f48] outline-none">

    <a href="#" class="text-xs text-gray-300">Forgot password?</a>

    <button class="w-full bg-[#2bb39b] py-3 rounded font-semibold hover:bg-[#249d88]">
      Login
    </button>
  </form>

</div>

</body>
</html>
